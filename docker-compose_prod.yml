name: vulnchecker-prod

services:
  db:
    image: postgres:16-alpine
    container_name: vuln-db-prod
    restart: always
    networks:
      - backend_net
    environment:
      - POSTGRES_DB=vulncheck
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d vulncheck"]
      interval: 10s
    security_opt:
      - no-new-privileges:true

  backend:
    image: motihc/vuln-backend:1.0.0
    container_name: vuln-backend-prod
    restart: always
    networks:
      - backend_net
      - frontend_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_O_LOCALHOST=db
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/vulncheck
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=false
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=prometheus,health,info
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
    security_opt:
      - no-new-privileges:true

  frontend:
    image: motihc/vuln-frontend:1.0.0
    container_name: vuln-frontend-prod
    restart: always
    networks:
      - frontend_net
      - backend_net
    ports:
      - '80:80'
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:latest
    container_name: vuln-prometheus-prod
    restart: unless-stopped
    networks:
      - backend_net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    container_name: vuln-grafana-prod
    restart: unless-stopped
    networks:
      - backend_net
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    security_opt:
      - no-new-privileges:true

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: