# Prometheus - métricas para Grafana
# Backend debe estar en la red devsecops_net (misma que Prometheus) para ser alcanzado como backend:8080
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Spring Boot (Micrometer expone /actuator/prometheus)
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['backend:8080']
        labels:
          app: 'vulnchecker-backend'
