spring.application.name=vulncheckerbackend
server.port=8080

# Conexión a la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_O_LOCALHOST:localhost}:5432/vulncheck
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Configuración de Flyway para la gestión de migraciones de la base de datos
spring.flyway.url=jdbc:postgresql://${DB_O_LOCALHOST:localhost}:5432/vulncheck
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.enabled=true

spring.docker.compose.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator + Prometheus (métricas para Grafana)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true